<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donald Gros — E-Commerce Cameroun en Ligne</title>
    <meta name="description" content="Donald Gros - Votre boutique en ligne de référence pour le prêt-à-porter de luxe et l'électroménager au Cameroun" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <style>
      /* ─── SPLASH SCREEN (shows instantly before JS loads) ─── */ 
      #splash-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 50%, #f0fdf4 100%);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash-loader.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .splash-brand {
        font-family: 'Montserrat', sans-serif;
        font-size: 2rem;
        font-weight: 900;
        color: #1a56db;
        letter-spacing: -0.02em;
        margin-bottom: 2rem;
        animation: splash-fade-in 0.6s ease;
      }
      .splash-brand span {
        color: #16a34a;
      }
      .splash-spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 4px solid #f3f4f6;
        border-top-color: #1a56db;
        border-right-color: #16a34a;
        animation: splash-spin 0.8s linear infinite;
      }
      .splash-text {
        margin-top: 1.5rem;
        font-family: 'Open Sans', sans-serif;
        font-size: 0.85rem;
        color: #6b7280;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 600;
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-fade-in {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Splash loader visible immediately -->
    <div id="splash-loader">

      <div class="splash-brand">DONALD <span>GROS</span></div>
      <div class="splash-spinner"></div>
      <p class="splash-text">Chargement…</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
